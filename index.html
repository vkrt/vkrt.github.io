<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- CRITICAL: Tells mobile browsers to scale the website properly to fit the screen -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bharathnatyam Arangetram</title>
    <style>
        /* Modern Reset & Global Fonts */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fcf8f2;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        /* Container designed to fit mobile and desktop screens perfectly */
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }

        /* Headers with elegant color theme */
        h1 {
            color: #8a1c14; /* Deep Maroon / Traditional Indian Accent */
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 700;
        }
        h2 {
            color: #b35900; /* Warm Ochre/Gold */
            font-size: 1.4rem;
            margin-bottom: 25px;
        }

        /* Responsive Image Styling */
        .image-container {
            width: 100%;
            margin: 20px 0;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            border: 3px solid #8a1c14;
        }
        .image-desc {
            font-style: italic;
            color: #666;
            font-size: 0.9rem;
            margin-top: 8px;
        }

        /* Card Section for details */
        .details-card {
            background: #fff5eb;
            border-left: 4px solid #b35900;
            padding: 15px;
            margin: 25px 0;
            border-radius: 0 8px 8px 0;
            text-align: left;
        }
        
        /* Mobile-friendly large click targets/buttons */
        .btn {
            display: inline-block;
            background-color: #8a1c14;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            margin-top: 15px;
            transition: background 0.3s ease;
        }
        .btn:hover {
            background-color: #61130d;
        }

        /* Extra fine-tuning for very small devices */
        @media (max-width: 400px) {
            h1 { font-size: 1.5rem; }
            h2 { font-size: 1.2rem; }
            body { padding: 10px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Main Title -->
        <h1>Bharathnatyam Arangetram</h1>
        <h2>of Rushika & Tithi Raval</h2>
        
        <!-- Image Block -->
        <div class="image-container">
            <!-- Replace 'event-photo.png' with your actual uploaded image file name -->
            <img src="event-photo.png" alt="Rushika and Tithi Raval Bharathnatyam Performance">
            <div class="image-desc">Rushika and Tithi Raval</div>
        </div>

        <!-- Event Details Placeholder Card -->
        <div class="details-card">
            <p><strong>✨ Welcome to our Arangetram Page!</strong></p>
            <p style="margin-top: 8px;">We are excited to share this milestone dance debut celebration with our friends and family.</p>
        </div>

        <!-- Call to Action Link / Map button -->
        <a href="#details" class="btn">View Event Details</a>
    </div>

</body>
</html>
